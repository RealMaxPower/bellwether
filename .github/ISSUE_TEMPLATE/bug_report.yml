name: Bug report
description: Something in the app is broken or behaving unexpectedly
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. For **incorrect economic data**, use the *Data correction* template instead. For **security issues**, see [SECURITY.md](../../SECURITY.md) — do not file publicly.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
      placeholder: When I open /decompose with ?report=services, the backtest line doesn't render...
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Click '...'
        3. See error
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: Affected page / URL
      placeholder: /heatmap?report=services
  - type: dropdown
    id: where
    attributes:
      label: Where did you see this?
      options:
        - Live site (bellwether)
        - Local dev (npm run dev)
        - Both
  - type: textarea
    id: environment
    attributes:
      label: Browser / OS
      placeholder: "Chrome 124 on macOS 15; or: Node 20, Next 16 locally"
  - type: textarea
    id: extra
    attributes:
      label: Screenshots or console output
      description: Paste any errors from the browser console or terminal.
